<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>
    <form action="{{ url_for('add') }}" method="get" class="new-post-form">
        <button class="btn primary-btn" type="submit">
            + Add new Blog Post
        </button>
    </form>
    {% for post in posts %}
        <div class="post">
            <h2>{{post['title']}}</h2>
            <p><em>{{post['author']}}</em></p>
            <p>{{post['content']}}</p>
            <div class="actions">
                <form action="{{ url_for('upvotes', post_id=post.id) }}" method="post" class="inline-form">
                    <button type="submit" class="btn like-btn">
                        👍 {{ post['likes'] }}
                    </button>
                </form>

                <form action="{{ url_for('update', post_id=post.id) }}" method="get" class="inline-form">
                    <button type="submit" class="btn update-btn">Edit</button>
                </form>

                <form action="{{ url_for('delete', post_id=post.id) }}" method="post" class="inline-form">
                    <button type="submit" class="btn delete-btn">Delete</button>
                </form>
            </div>
        </div>
    {% else %}
        <h1>Start posting right away. Right now we don't have any posts.</h1>
    {% endfor %}
</body>
</html>
